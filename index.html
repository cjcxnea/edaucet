    <title>全国大学英语四、六级考试（含口试）成绩查询</title>
  </head>
  <body>
    <nav class="page-nav">
      <div class="nav-container">
        <img src="img/logo.png" alt="" />
        <span class="nav-title">统一用户登录</span>
      </div>
    </nav>

    <main>
      <div class="page-main">
        <div class="main-container">
          <form action="search.html">
            <!-- 表单标题 -->
            <div class="form-title">
              <span class="form-title-left">考生登录</span>
              <span class="form-title-right">没有账号?立即注册</span>
            </div>
            <!-- 输入框区域 -->
            <div class="form-area">
              <div class="form-item">
                <label for="idCard">证件号码</label>
                <div class="form-item-input">
                  <input
                    type="text"
                    id="idCard"
                    name="idCard"
                    placeholder="请输入注册时的证件号码"
                    maxlength="18"
                    required
                  />
                </div>
              </div>

              <div class="form-item">
                <label for="password">登录密码</label>
                <div class="form-item-input">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="请输入登录密码"
                    maxlength="18"
                    required
                  />
                  <span class="eye-icon">
                    <svg
                      t="1678707488027"
                      class="eye-open pwdEye"
                      viewBox="0 0 1024 1024"
                      version="1.1"
                      xmlns="http://www.w3.org/2000/svg"
                      p-id="3118"
                      width="24"
                      height="24"
                    >
                      <path
                        class="pwdEyeInner"
                        d="M512 209.403241c-201.731514 0-374.009206 125.476783-443.808922 302.596759 69.798692 177.119977 242.077408 302.596759 443.808922 302.596759 201.933105 0 374.010229-125.476783 443.808922-302.596759C886.009206 334.880023 713.933105 209.403241 512 209.403241zM512 713.731514c-111.355157 0-201.731514-90.375334-201.731514-201.731514s90.375334-201.731514 201.731514-201.731514 201.731514 90.375334 201.731514 201.731514S623.355157 713.731514 512 713.731514zM512 390.961296c-66.772776 0-121.038704 54.265928-121.038704 121.038704s54.265928 121.038704 121.038704 121.038704 121.038704-54.265928 121.038704-121.038704S578.772776 390.961296 512 390.961296z"
                        p-id="3119"
                        fill="#cccccc"
                      ></path>
                    </svg>
                    <svg
                      class="eye-close pwdEye"
                      viewBox="0 0 1024 1024"
                      version="1.1"
                      xmlns="http://www.w3.org/2000/svg"
                      p-id="3118"
                      width="24"
                      height="24"
                    >
                      <path
                        class="pwdEyeInner"
                        d="M512 209.403241c-201.731514 0-374.009206 125.476783-443.808922 302.596759 69.798692 177.119977 242.077408 302.596759 443.808922 302.596759 201.933105 0 374.010229-125.476783 443.808922-302.596759C886.009206 334.880023 713.933105 209.403241 512 209.403241zM512 713.731514c-111.355157 0-201.731514-90.375334-201.731514-201.731514s90.375334-201.731514 201.731514-201.731514 201.731514 90.375334 201.731514 201.731514S623.355157 713.731514 512 713.731514zM512 390.961296c-66.772776 0-121.038704 54.265928-121.038704 121.038704s54.265928 121.038704 121.038704 121.038704 121.038704-54.265928 121.038704-121.038704S578.772776 390.961296 512 390.961296z"
                        p-id="3119"
                        fill="#003f7e"
                      ></path>
                    </svg>
                  </span>
                </div>
              </div>

              <div class="form-item">
                <label for="verifCode">验证码</label>
                <div class="form-item-input">
                  <input
                    type="text"
                    id="verifCode"
                    name="verifCode"
                    placeholder="不区分大小写"
                    maxlength="4"
                    required
                  />
                  <span class="verif-code">
                    <img
                      src="verif_code_img/verif-code-1.jpg"
                      alt="verif-code"
                    />
                  </span>
                </div>
              </div>

              <div class="form-item-extra">
                <a href="#">忘记密码？</a>
              </div>
            </div>

            <div class="form-btn">
              <button type="submit">登录</button>
            </div>
          </form>
        </div>
      </div>
